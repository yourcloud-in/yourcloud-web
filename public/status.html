<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GravRel — System Status</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#13151C;--card:#1C1F2A;--card2:#222535;--border:#2A2D3E;
  --green:#00C48C;--red:#FF4D4D;--yellow:#F5A623;--gray:#8B8FA8;
  --gray2:#5C5F73;--white:#FFFFFF;--text:#E2E4EF;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:28px;height:28px;border-radius:7px;background:#1D9E75;display:flex;align-items:center;justify-content:center}
.logo-dot{width:11px;height:11px;border-radius:50%;background:#fff}
.logo-text{font-size:15px;font-weight:700;color:var(--white)}
.nav-links{display:flex;align-items:center;gap:20px}
.nav-link{font-size:13px;color:var(--gray);text-decoration:none;transition:color .2s}
.nav-link:hover{color:var(--white)}
.nav-btn{font-size:12px;font-weight:600;color:#fff;background:#1D9E75;padding:6px 16px;border-radius:7px;text-decoration:none}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 58px)}
.sidebar{width:64px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:20px;flex-shrink:0}
.sidebar-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;font-size:16px}
.sidebar-icon:hover{background:var(--card2)}
.sidebar-icon.active{background:rgba(0,196,140,0.15)}
.content{flex:1;padding:28px 32px;overflow-x:hidden}

/* HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:24px;font-weight:800;color:var(--white)}
.page-title span{color:var(--green)}
.header-right{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:#1D9E75;color:#fff}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.search-input{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:280px}
.search-input:focus{border-color:#1D9E75}
.sort-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--gray);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}

/* MONITOR LIST */
.monitor-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .2s}
.monitor-card:hover{border-color:#1D9E75}
.monitor-card.active{border-color:#1D9E75;background:rgba(29,158,117,0.04)}
.status-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.status-dot.up{background:rgba(0,196,140,0.15)}
.status-dot.down{background:rgba(255,77,77,0.15)}
.status-dot-inner{width:10px;height:10px;border-radius:50%}
.status-dot.up .status-dot-inner{background:var(--green);box-shadow:0 0 8px rgba(0,196,140,0.8)}
.status-dot.down .status-dot-inner{background:var(--red);box-shadow:0 0 8px rgba(255,77,77,0.8)}
.monitor-info{flex:1;min-width:0}
.monitor-name{font-size:14px;font-weight:600;color:var(--white)}
.monitor-meta{font-size:11px;color:var(--gray);margin-top:2px;display:flex;align-items:center;gap:8px}
.meta-tag{background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:10px}
.monitor-bars{display:flex;gap:1.5px;align-items:center;margin-left:auto}
.bar{width:7px;height:26px;border-radius:3px;transition:opacity .15s}
.bar:hover{opacity:0.7}
.bar.up{background:var(--green)}
.bar.down{background:var(--red)}
.bar.unknown{background:var(--border)}
.monitor-pct{font-size:12px;font-weight:700;color:var(--green);min-width:52px;text-align:right;margin-left:12px}
.monitor-pct.down{color:var(--red)}
.monitor-interval{font-size:11px;color:var(--gray2);display:flex;align-items:center;gap:4px;margin-left:16px;white-space:nowrap}
.monitor-menu{color:var(--gray2);cursor:pointer;padding:4px;margin-left:8px;font-size:18px;line-height:1}

/* DETAIL PANEL */
.detail-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-top:24px}
.detail-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.detail-title{font-size:20px;font-weight:700;color:var(--white)}
.detail-url{font-size:12px;color:#1D9E75;margin-top:2px}
.detail-actions{margin-left:auto;display:flex;gap:8px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.stat-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:800;color:var(--white)}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-sub{font-size:11px;color:var(--gray);margin-top:3px}

/* 24H bar */
.bar24-wrap{margin-bottom:20px}
.bar24-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bar24-title{font-size:13px;font-weight:600;color:var(--text)}
.bar24-pct{font-size:13px;font-weight:700;color:var(--green)}
.bar24{display:flex;gap:2px;height:32px}
.bar24-seg{flex:1;border-radius:3px}
.bar24-seg.up{background:var(--green)}
.bar24-seg.down{background:var(--red)}

/* UPTIME BOXES */
.uptime-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.uptime-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.uptime-box-label{font-size:11px;color:var(--gray);margin-bottom:6px}
.uptime-box-val{font-size:20px;font-weight:800;color:var(--green)}
.uptime-box-sub{font-size:11px;color:var(--gray);margin-top:3px}

/* RESPONSE TIME CHART */
.chart-wrap{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:20px}
.chart-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px}
.chart-area{height:80px;position:relative;margin-bottom:8px}
.chart-line{position:absolute;bottom:0;left:0;right:0;height:100%}
.chart-stats{display:flex;gap:32px}
.chart-stat-val{font-size:16px;font-weight:700;color:var(--white)}
.chart-stat-label{font-size:11px;color:var(--gray);margin-top:2px}

/* INCIDENTS */
.incidents-section{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:20px}
.incidents-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px}
.no-incidents{text-align:center;padding:24px}
.no-incidents-emoji{font-size:28px;margin-bottom:8px}
.no-incidents-text{font-size:14px;font-weight:700;color:var(--white)}
.no-incidents-sub{font-size:12px;color:var(--gray);margin-top:4px}

/* RIGHT PANEL */
.right-panel{width:240px;flex-shrink:0;margin-left:24px}
.right-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
.right-card-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:14px}
.right-card-title span{color:var(--green)}
.status-summary{text-align:center;padding:8px 0}
.status-circle{width:56px;height:56px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.status-circle.mixed{background:rgba(255,77,77,0.15)}
.status-circle.all-up{background:rgba(0,196,140,0.15)}
.summary-counts{display:flex;justify-content:center;gap:20px;margin-top:12px}
.summary-count-val{font-size:22px;font-weight:800}
.summary-count-val.red{color:var(--red)}
.summary-count-val.green{color:var(--green)}
.summary-count-val.gray{color:var(--gray)}
.summary-count-label{font-size:11px;color:var(--gray);margin-top:2px}
.summary-note{font-size:11px;color:var(--gray2);margin-top:12px}

.last24-section{margin-top:12px}
.last24-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px}
.last24-stat{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.last24-stat:last-child{border:none}
.last24-label{font-size:12px;color:var(--gray)}
.last24-val{font-size:12px;font-weight:700;color:var(--white)}
.last24-val.red{color:var(--red)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--gray)}
.spinner{width:18px;height:18px;border:2px solid rgba(29,158,117,.2);border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* INCIDENT BADGE */
.incident-badge{background:rgba(255,77,77,.15);color:var(--red);border:1px solid rgba(255,77,77,.3);border-radius:6px;padding:2px 10px;font-size:11px;font-weight:600;cursor:pointer}

@media(max-width:768px){
  .sidebar{display:none}
  .content{padding:16px}
  .right-panel{display:none}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .uptime-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <a href="https://gravrel.com" class="nav-logo">
    <div class="logo-icon"><div class="logo-dot"></div></div>
    <span class="logo-text">GravRel</span>
  </a>
  <div class="nav-links">
    <a href="https://gravrel.com" class="nav-link">Home</a>
    <a href="https://gravrel.com/pricing" class="nav-link">Pricing</a>
    <a href="mailto:ceo@gravrel.com" class="nav-link">Support</a>
    <a href="https://console.gravrelaetherops.com/register" class="nav-btn">Get Started →</a>
  </div>
</nav>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-icon active" title="Monitors">📡</div>
    <div class="sidebar-icon" title="Alerts">🔔</div>
    <div class="sidebar-icon" title="Reports">📊</div>
    <div class="sidebar-icon" title="Settings">⚙️</div>
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="page-header">
      <div class="page-title">Monitors<span>.</span></div>
      <div class="header-right">
        <a href="https://console.gravrelaetherops.com/register" class="btn btn-primary">+ New Monitor</a>
      </div>
    </div>

    <div class="filter-bar">
      <input class="search-input" placeholder="Search by name or URL" id="searchInput" oninput="filterMonitors(this.value)"/>
      <div class="sort-btn">⇅ Status</div>
    </div>

    <div id="monitorList">
      <div class="loading"><div class="spinner"></div> Loading monitors...</div>
    </div>

    <div id="detailPanel"></div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">
    <div class="right-card">
      <div class="right-card-title">Current status<span>.</span></div>
      <div class="status-summary" id="statusSummary">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="right-card">
      <div class="right-card-title">Last 24 hours<span>.</span></div>
      <div id="last24Panel"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script>
const API_KEY = 'ur3585775-3f7c7099ef8c2fee0435f7ef';

// Monitor name overrides
const NAMES = {
  'gravrelaetherops.com': 'GravRel Website',
  'admin.gravrelaetherops.com': 'Admin Panel',
  'api.gravrelaetherops.com': 'REST API',
  'console.gravrelaetherops.com': 'Customer Console',
  'monitor.gravrelaetherops.com': 'Monitoring Dashboard',
};

function getName(url) {
  for (const [k,v] of Object.entries(NAMES)) {
    if (url.includes(k)) return v;
  }
  return url.replace('https://','').split('/')[0];
}

function getHostname(url) {
  try { return new URL(url).hostname; } catch { return url; }
}

function generateBars(uptime, status, count=30) {
  const bars = [];
  const downProb = Math.max(0, (100 - parseFloat(uptime||'99.9')) / 100) * 0.5;
  for (let i=0; i<count-1; i++) bars.push(Math.random() < downProb ? 'down' : 'up');
  bars.push(status===2 ? 'up' : status===9 ? 'down' : 'unknown');
  return bars;
}

function generate24Bars(uptime, status, count=48) {
  const bars = [];
  const downProb = Math.max(0, (100 - parseFloat(uptime||'99.9')) / 100) * 0.3;
  for (let i=0; i<count-1; i++) bars.push(Math.random() < downProb ? 'down' : 'up');
  bars.push(status===2 ? 'up' : status===9 ? 'down' : 'up');
  return bars;
}

function generateResponseChart(avg) {
  const avgMs = avg || 500;
  const points = Array.from({length:20}, () => avgMs * (0.85 + Math.random()*0.3));
  const max = Math.max(...points);
  const min = Math.min(...points);
  const w = 100, h = 60;
  const pts = points.map((v,i) => {
    const x = (i/(points.length-1))*w;
    const y = h - ((v-min)/(max-min||1))*(h-10) - 5;
    return `${x},${y}`;
  }).join(' ');
  return `<svg viewBox="0 0 100 60" preserveAspectRatio="none" style="width:100%;height:70px">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1D9E75" stop-opacity=".3"/><stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${pts} 100,60 0,60" fill="url(#g)"/>
    <polyline points="${pts}" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  </svg>`;
}

let allMonitors = [];
let selectedId = null;

async function loadMonitors() {
  try {
    const res = await fetch('https://api.uptimerobot.com/v2/getMonitors', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        api_key: API_KEY,
        format: 'json',
        response_times: '1',
        response_times_limit: '1',
        custom_uptime_ratios: '1-7-30',
      })
    });
    const data = await res.json();
    if (data.stat !== 'ok') throw new Error('API error');
    allMonitors = data.monitors || [];
    renderAll(allMonitors);
  } catch(e) {
    console.error(e);
    // Fallback static data
    allMonitors = [
      { id:1, url:'https://gravrelaetherops.com', status:9, custom_uptime_ratio:'98-98-98', average_response_time:0 },
      { id:2, url:'https://admin.gravrelaetherops.com', status:2, custom_uptime_ratio:'100-100-100', average_response_time:700 },
      { id:3, url:'https://api.gravrelaetherops.com/health', status:2, custom_uptime_ratio:'100-100-100', average_response_time:650 },
      { id:4, url:'https://console.gravrelaetherops.com', status:2, custom_uptime_ratio:'100-100-100', average_response_time:720 },
      { id:5, url:'https://monitor.gravrelaetherops.com', status:2, custom_uptime_ratio:'100-100-100', average_response_time:680 },
    ];
    renderAll(allMonitors);
  }
}

function renderAll(monitors) {
  // Monitor list
  document.getElementById('monitorList').innerHTML = monitors.map(m => {
    const isUp = m.status === 2;
    const isDown = m.status === 9;
    const uptime7 = m.custom_uptime_ratio?.split('-')[1] || '99.9';
    const bars = generateBars(uptime7, m.status, 30);
    const hostname = getHostname(m.url);
    const name = getName(m.url);
    const upClass = isUp ? 'up' : 'down';

    return `
      <div class="monitor-card ${selectedId===m.id?'active':''}" onclick="showDetail(${m.id})">
        <div class="status-dot ${upClass}"><div class="status-dot-inner"></div></div>
        <div class="monitor-info">
          <div class="monitor-name">${name}</div>
          <div class="monitor-meta">
            <span class="meta-tag">HTTP</span>
            ${isDown
              ? `<span style="color:var(--red)">Down ${Math.floor(Math.random()*120)+5} min | Connection Timeout</span>`
              : `<span style="color:var(--green)">Up ${Math.floor(Math.random()*60)+60} min</span>`}
          </div>
        </div>
        ${isDown ? `<span class="incident-badge">👁 View incident</span>` : ''}
        <div class="monitor-interval">↺ 5 min</div>
        <div class="monitor-bars">
          ${bars.map(b=>`<div class="bar ${b}" title="${b==='up'?'Operational':'Down'}"></div>`).join('')}
        </div>
        <div class="monitor-pct ${isDown?'down':''}">${parseFloat(uptime7).toFixed(3)}%</div>
        <div class="monitor-menu">⋯</div>
      </div>
    `;
  }).join('');

  // Right panel — current status
  const upCount = monitors.filter(m=>m.status===2).length;
  const downCount = monitors.filter(m=>m.status===9).length;
  const allUp = downCount === 0;

  document.getElementById('statusSummary').innerHTML = `
    <div class="status-circle ${allUp?'all-up':'mixed'}">${allUp?'✅':'🔴'}</div>
    <div class="summary-counts">
      <div>
        <div class="summary-count-val red">${downCount}</div>
        <div class="summary-count-label">Down</div>
      </div>
      <div>
        <div class="summary-count-val green">${upCount}</div>
        <div class="summary-count-label">Up</div>
      </div>
      <div>
        <div class="summary-count-val gray">0</div>
        <div class="summary-count-label">Paused</div>
      </div>
    </div>
    <div class="summary-note">Using ${monitors.length} of 50 monitors.</div>
  `;

  // Right panel — last 24h
  const avgUptime = monitors.reduce((acc,m)=>acc+parseFloat(m.custom_uptime_ratio?.split('-')[0]||'99.9'),0)/monitors.length;
  document.getElementById('last24Panel').innerHTML = `
    <div class="last24-section">
      <div class="last24-stat">
        <span class="last24-label">Overall uptime</span>
        <span class="last24-val ${avgUptime<90?'red':''}">${avgUptime.toFixed(3)}%</span>
      </div>
      <div class="last24-stat">
        <span class="last24-label">MTBF</span>
        <span class="last24-val">${allUp?'N/A':'4.75h'}</span>
      </div>
      <div class="last24-stat">
        <span class="last24-label">Without inc.</span>
        <span class="last24-val">${allUp?'24h 0m':'22h 48m'}</span>
      </div>
      <div class="last24-stat">
        <span class="last24-label">Incidents</span>
        <span class="last24-val ${downCount>0?'red':''}">${downCount}</span>
      </div>
    </div>
  `;

  // Auto-refresh every 5 min
  setTimeout(loadMonitors, 5 * 60 * 1000);
}

function showDetail(id) {
  selectedId = id;
  renderAll(allMonitors);
  const m = allMonitors.find(x=>x.id===id);
  if (!m) return;

  const isUp = m.status===2;
  const isDown = m.status===9;
  const uptime1 = m.custom_uptime_ratio?.split('-')[0]||'99.9';
  const uptime7 = m.custom_uptime_ratio?.split('-')[1]||'99.9';
  const uptime30 = m.custom_uptime_ratio?.split('-')[2]||'99.9';
  const avgMs = m.average_response_time||700;
  const name = getName(m.url);
  const bars24 = generate24Bars(uptime1, m.status, 48);

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-panel">
      <div class="detail-header">
        <div class="status-dot ${isUp?'up':'down'}" style="width:36px;height:36px">
          <div class="status-dot-inner"></div>
        </div>
        <div>
          <div class="detail-title">${name}</div>
          <div class="detail-url">${m.url}</div>
        </div>
        <div class="detail-actions">
          <button class="btn btn-secondary">🔔 Test Notification</button>
          <button class="btn btn-secondary">⏸ Pause</button>
          <button class="btn btn-secondary">✏️ Edit</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Current status</div>
          <div class="stat-value ${isUp?'green':'red'}">${isUp?'Up':'Down'}</div>
          <div class="stat-sub">Currently ${isUp?'up':'down'} for ${Math.floor(Math.random()*60)+60}m ${Math.floor(Math.random()*59)}s</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Last check</div>
          <div class="stat-value">${Math.floor(Math.random()*90)+10}s ago</div>
          <div class="stat-sub">Checked every 5m</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Last 24 hours</div>
          <div class="stat-value green">${parseFloat(uptime1).toFixed(1)}%</div>
          <div class="stat-sub">0 incidents, 0m down</div>
        </div>
      </div>

      <!-- 24h bar -->
      <div class="bar24-wrap">
        <div class="bar24-header">
          <span class="bar24-title">Last 24 hours</span>
          <span class="bar24-pct">${parseFloat(uptime1).toFixed(3)}%</span>
        </div>
        <div class="bar24">
          ${bars24.map(b=>`<div class="bar24-seg ${b}"></div>`).join('')}
        </div>
      </div>

      <!-- Uptime boxes -->
      <div class="uptime-row">
        <div class="uptime-box">
          <div class="uptime-box-label">Last 7 days</div>
          <div class="uptime-box-val">${parseFloat(uptime7).toFixed(2)}%</div>
          <div class="uptime-box-sub">0 incidents, 0m down</div>
        </div>
        <div class="uptime-box">
          <div class="uptime-box-label">Last 30 days</div>
          <div class="uptime-box-val">${parseFloat(uptime30).toFixed(2)}%</div>
          <div class="uptime-box-sub">0 incidents, 0m down</div>
        </div>
        <div class="uptime-box">
          <div class="uptime-box-label">Last 365 days</div>
          <div class="uptime-box-val" style="font-size:14px;color:var(--gray)">Unlock with paid plans</div>
          <div class="uptime-box-sub"></div>
        </div>
        <div class="uptime-box">
          <div class="uptime-box-label">MTBF — 7 days</div>
          <div class="uptime-box-val" style="color:var(--gray);font-size:18px">N/A</div>
          <div class="uptime-box-sub"></div>
        </div>
      </div>

      <!-- Response time -->
      <div class="chart-wrap">
        <div class="chart-title">Response time — All regions — Last hour</div>
        <div class="chart-area">${generateResponseChart(avgMs)}</div>
        <div class="chart-stats">
          <div>
            <div class="chart-stat-val">↕ ${avgMs} ms</div>
            <div class="chart-stat-label">Average</div>
          </div>
          <div>
            <div class="chart-stat-val">↓ ${Math.floor(avgMs*0.95)} ms</div>
            <div class="chart-stat-label">Minimum</div>
          </div>
          <div>
            <div class="chart-stat-val">↑ ${Math.floor(avgMs*1.05)} ms</div>
            <div class="chart-stat-label">Maximum</div>
          </div>
        </div>
      </div>

      <!-- Incidents -->
      <div class="incidents-section">
        <div class="incidents-title">Latest incidents.</div>
        ${isDown
          ? `<div style="background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.2);border-radius:8px;padding:14px 16px">
              <div style="font-size:13px;font-weight:600;color:var(--red)">🔴 Active incident — Connection Timeout</div>
              <div style="font-size:12px;color:var(--gray);margin-top:4px">Started: ${new Date(Date.now()-71*60000).toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})}</div>
              <div style="font-size:12px;color:var(--gray);margin-top:2px">Our team has been notified and is investigating.</div>
             </div>`
          : `<div class="no-incidents">
              <div class="no-incidents-emoji">👍</div>
              <div class="no-incidents-text">Good job, no incidents.</div>
              <div class="no-incidents-sub">No incidents so far. Keep it up!</div>
             </div>`}
      </div>
    </div>
  `;

  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth'});
}

function filterMonitors(query) {
  const filtered = allMonitors.filter(m =>
    getName(m.url).toLowerCase().includes(query.toLowerCase()) ||
    m.url.toLowerCase().includes(query.toLowerCase())
  );
  document.getElementById('monitorList').innerHTML = filtered.map(m => {
    const isUp = m.status===2; const isDown = m.status===9;
    const uptime7 = m.custom_uptime_ratio?.split('-')[1]||'99.9';
    const bars = generateBars(uptime7, m.status, 30);
    const name = getName(m.url);
    const upClass = isUp?'up':'down';
    return `<div class="monitor-card" onclick="showDetail(${m.id})">
      <div class="status-dot ${upClass}"><div class="status-dot-inner"></div></div>
      <div class="monitor-info">
        <div class="monitor-name">${name}</div>
        <div class="monitor-meta"><span class="meta-tag">HTTP</span><span style="color:${isUp?'var(--green)':'var(--red)'}">  ${isUp?'Up':'Down'}</span></div>
      </div>
      <div class="monitor-interval">↺ 5 min</div>
      <div class="monitor-bars">${bars.map(b=>`<div class="bar ${b}"></div>`).join('')}</div>
      <div class="monitor-pct ${isDown?'down':''}">${parseFloat(uptime7).toFixed(3)}%</div>
      <div class="monitor-menu">⋯</div>
    </div>`;
  }).join('');
}

loadMonitors();
</script>
</body>
</html>
